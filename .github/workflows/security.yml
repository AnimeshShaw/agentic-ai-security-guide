name: Security Scan

on:
  # Run on every push and PR
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Run weekly to catch newly disclosed CVEs against the pinned lockfile
  schedule:
    - cron: "0 6 * * 1"   # Every Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # Required to upload SARIF results to GitHub Security tab

jobs:
  # ── npm audit ─────────────────────────────────────────────────
  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit (fail on high+)
        run: npm audit --audit-level=high

      - name: Full audit report (informational)
        run: npm audit --audit-level=info || true

  # ── CodeQL static analysis ────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Focus on security queries only
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}

